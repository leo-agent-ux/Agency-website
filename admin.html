<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Admin Dashboard</title>

  <style>
    body {
      font-family: Arial;
      background: #0a0a0a;
      color: white;
      margin: 0;
      padding: 20px;
    }

    h1 {
      color: gold;
    }

    .card {
      background: #111;
      padding: 15px;
      margin-bottom: 10px;
      border-radius: 10px;
      border: 1px solid #222;
    }

    .label {
      color: gold;
      font-weight: bold;
    }
  </style>
</head>

<body>

<h1>Leads Dashboard</h1>

<div id="leadsContainer">Loading...</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCgFpLoDBZ-JxOXyaMJNxB_rbCoa91jSPA",
  authDomain: "studiox-b6f70.firebaseapp.com",
  projectId: "studiox-b6f70",
  storageBucket: "studiox-b6f70.appspot.com",
  messagingSenderId: "181987957314",
  appId: "1:181987957314:web:2e35d718a1aa80b6946bdb"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const container = document.getElementById("leadsContainer");

async function loadLeads() {
  const querySnapshot = await getDocs(collection(db, "leads"));

  container.innerHTML = "";

  querySnapshot.forEach((doc) => {
    const data = doc.data();

    container.innerHTML += `
      <div class="card">
        <p><span class="label">Business:</span> ${data.business}</p>
        <p><span class="label">Industry:</span> ${data.industry}</p>
        <p><span class="label">Goal:</span> ${data.goal}</p>
        <p><span class="label">Type:</span> ${data.type}</p>
        <p><span class="label">Style:</span> ${data.style}</p>
        <p><span class="label">Price:</span> £${data.priceEstimate}</p>
        <p><span class="label">Status:</span> ${data.status}</p>
      </div>
    `;
  });
}

loadLeads();
</script>

</body>
</html>
