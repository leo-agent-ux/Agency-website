<h1>Project Builder</h1>

<form id="quoteForm">

<!-- STEP 1 -->

<input name="industry" placeholder="Industry">
<input name="goal" placeholder="Goal">
<input name="website" placeholder="Website">

<!-- STEP 2 -->
<select id="type">
  <option>Business Website</option>
  <option>E-commerce</option>
  <option>Booking System</option>
  <option>SaaS</option>
  <option>Portfolio</option>
  <option>Landing Page</option>
</select>

<!-- STEP 3 -->
<select id="style">
  <option>Minimal & Clean</option>
  <option>Luxury & Premium</option>
  <option>Bold & Modern</option>
  <option>Corporate</option>
</select>

<select id="animations">
  <option>No animations</option>
  <option>Basic animations</option>
  <option>High-end smooth animations</option>
</select>

<!-- STEP 4 FEATURES (FIXED) -->
<label><input type="checkbox" name="features" value="Contact Forms"> Contact Forms</label><br>
<label><input type="checkbox" name="features" value="Booking System"> Booking System</label><br>
<label><input type="checkbox" name="features" value="Payments"> Payments</label><br>
<label><input type="checkbox" name="features" value="Admin Dashboard"> Admin Dashboard</label><br>
<label><input type="checkbox" name="features" value="Login System"> Login System</label><br>
<label><input type="checkbox" name="features" value="CMS"> CMS</label><br>
<label><input type="checkbox" name="features" value="SEO Setup"> SEO Setup</label><br>
<label><input type="checkbox" name="features" value="Analytics"> Analytics</label><br>
<label><input type="checkbox" name="features" value="Email Automation"> Email Automation</label><br>
<label><input type="checkbox" name="features" value="WhatsApp Integration"> WhatsApp Integration</label><br>

<!-- STEP 5 -->
<select id="growth">
  <option>Leads</option>
  <option>Sales</option>
  <option>Bookings</option>
  <option>Branding</option>
</select>

<input id="target" placeholder="Monthly target">
<input id="urgency" placeholder="Urgency">

<!-- STEP 6 -->
<select id="content">
  <option>I have everything</option>
  <option>I need help</option>
  <option>I need full copywriting</option>
</select>

<!-- STEP 7 -->
<select id="timeline">
  <option>Flexible</option>
  <option>Standard</option>
  <option>Rush</option>
</select>

<!-- STEP 8 -->
<p id="summaryText"></p>
<p id="priceEstimate"></p>
<p id="complexity"></p>

<button type="button" onclick="generateSummary()">Generate Summary</button>
<button type="submit">Submit</button>
