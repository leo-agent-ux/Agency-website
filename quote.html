<div class="container">

<h1>Project Quote</h1>
<p>Tell us about your project — we only take serious builds.</p>

<form action="https://formspree.io/f/mlgoblln" method="POST">

<div class="card">
<h2>Business Info</h2>
<input name="business" placeholder="Business Name" required>
<input name="industry" placeholder="Industry">
<input name="email" placeholder="Email" required>
</div>

<div class="card">
<h2>Project Type</h2>
<select name="type">
<option>Business Website</option>
<option>E-commerce</option>
<option>Booking System</option>
<option>SaaS</option>
</select>
</div>

<div class="card">
<h2>Goals</h2>
<select name="goal">
<option>More leads</option>
<option>More sales</option>
<option>Brand upgrade</option>
</select>
</div>

<div class="card">
<h2>Details</h2>
<textarea name="details" rows="6"></textarea>
</div>

<button class="btn">Submit Request</button>

</form>

</div>
